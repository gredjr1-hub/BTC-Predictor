name: AI Trading Bot (Headless)

on:
  schedule:
    # Attempt to run every 15 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy ta ccxt scikit-learn==1.3.2 joblib gspread google-auth

    - name: Run Headless Bot
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python bot.py
